
services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: always
    volumes:
    - /srv/vaultwarden/data:/data
    ports:
    - "8080:80"
    environment:
      ADMIN_TOKEN: "myp@ssword"
      DOMAIN: "https://bassoserver.duckdns.org"
      WEBSOCKET_ENABLED: "true"
